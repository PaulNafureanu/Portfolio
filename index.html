<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f8fafc" />

    <!--
      Preload every declared weight, as requested.
      crossorigin is required for font preloads, including same-origin fonts.
    -->
    <link
      rel="preload"
      href="/fonts/jetbrains-mono/JetBrainsMono-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="/fonts/jetbrains-mono/JetBrainsMono-Medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="/fonts/jetbrains-mono/JetBrainsMono-SemiBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="/fonts/jetbrains-mono/JetBrainsMono-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Favicon fallbacks, with SVG preferred by modern browsers. -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon/site.webmanifest" />

    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="ef957e40-5e7e-4c74-ace9-496625ec705e"
    ></script>
    <title>Paul-Andrei Nafureanu</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
